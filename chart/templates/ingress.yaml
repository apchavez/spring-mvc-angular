apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "product-service.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  name: http
          - path: /actuator
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  name: http
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  name: http
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: product-web
                port:
                  number: 80
