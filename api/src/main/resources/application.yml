spring:
  application:
    name: product-service
  batch:
    job:
      # This app only ever launches productImportJob on demand, from ProductImportController,
      # in response to a real CSV upload — never via Boot's JobLauncherApplicationRunner, which
      # would otherwise auto-run every discovered Job bean at startup with empty parameters.
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:certs/public.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  private-key-location: classpath:certs/private.pem
  expiration-ms: 3600000
  issuer: product-service

security:
  cors:
    allowed-origins: ""
